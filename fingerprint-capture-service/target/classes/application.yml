# Fingerprint Capture Service Configuration
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: fingerprint-capture-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ABIS Server Configuration
abis:
  server:
    host: 10.22.74.51
    port: 8091
    domain: EnrollmentSDK
    legacy-host: 10.22.74.51
    dr-host: 10.22.74.51
  library:
    path: c:/Users/Rodb/Desktop/AFIS/6.2.2-SNAPSHOT/abisclient-dll
  capture:
    # Timeout for fingerprint capture in milliseconds
    timeout: 30000
    # Quality threshold (0-100)
    quality-threshold: 40
    # Number of retry attempts for capture
    max-retries: 3

# Fingerprint Scanner Configuration
scanner:
  # Scanner type: MOCK, GENERIC_USB, INTEGRATED_BIOMETRICS, WINDOWS_BIOMETRIC, SECUGEN, FUTRONIC, DIGITAL_PERSONA, CROSSMATCH
  # INTEGRATED_BIOMETRICS: For Integrated Biometrics scanners (IBScanUltimate SDK)
  type: INTEGRATED_BIOMETRICS
  # Scanner device index (for multi-device setups)
  device-index: 0
  # Image resolution DPI
  resolution: 500
  # Image format: BMP, WSQ, PNG, JPEG
  image-format: BMP

# Logging
logging:
  level:
    root: INFO
    com.genkey: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
